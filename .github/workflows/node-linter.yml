name: node-linter
on:
  push:
    paths:
      - "*.js"

jobs:
  code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      #- run: npm run build --if-present
      
      - name: Run Linter
        run: npm run lint
