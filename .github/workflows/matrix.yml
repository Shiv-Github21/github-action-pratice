name: matrix

on:
  workflow_dispatch:

jobs:
   installing-py-version:
     runs-on: ${{ matrix.os }}
     strategy: 
       matrix:
         os: [ubuntu-latest, windows-latest]
         python-version: ["3.10", "3.11", "3.12"]
         exclude:
           - os: windows-latest
             python-version: "3.10"

     steps:
       - name: checkout-code
         uses: actions/checkout@v4

       - name: installing/setup python version
         uses: actions/setup-python@v5
         with:
          python-version: ${{matrix.python-version}}
   
